const colorMapC2 = [4278191872, 4278848512, 4279505152, 4280161792, 4280818433, 4281475073, 4282131714, 4282788355, 4283444996, 4284101637, 4284758279, 4285414920, 4286071562, 4286728204, 4287384846, 4288041233, 4288697875, 4289354518, 4290011161, 4290667804, 4291324191, 4291587618, 4291719974, 4291786794, 4291918893, 4291985714, 4292118070, 4292250170, 4292316991, 4292449348, 4292515912, 4292648270, 4292714835, 4292847192, 4292979294, 4293046116, 4293178474, 4293245040, 4293377142, 4293443965, 4293576067, 4293708426, 4293774993, 4293907352, 4293973920, 4294106023, 4294172847, 4294304951, 4294437055, 4294503879, 4294635984, 4294702552, 4294834657, 4294901482, 4294574063, 4293984242, 4293394421, 4292804600, 4292214522, 4291624700, 4291034622, 4290444287, 4289854207, 4289263871, 4288673535, 4288083199, 4287492607, 4286902015, 4286311423, 4285720831, 4285130239, 4284539391, 4283948543, 4283357695, 4282766591, 4282175487, 4281584383, 4280927743, 4280336639, 4279745279, 4279153919, 4278562559, 4278233598, 4278232572, 4278231802, 4278231032, 4278230262, 4278229235, 4278228464, 4278227693, 4278226666, 4278225895, 4278225123, 4278224096, 4278223324, 4278222296, 4278221524, 4278220496, 4278219723, 4278218695, 4278217922, 4278216893, 4278216120, 4278215090, 4278214317, 4278213287, 4278212257, 4278211483, 4278210453, 4278209679, 4278208648, 4278207618, 4278206587, 4278205812, 4278204781, 4278203749, 4278202718, 4278201942, 4278200910, 4278199878, 4278198846, 4278197814, 4278197037, 4278196005, 4278194972, 4278193939, 4278192905, 4278191872];

const fillCol = `#${colorMapC[1].toString(16).slice(6, 8)}${colorMapC[1].toString(16).slice(4, 6)}${colorMapC[1].toString(16).slice(2, 4)}`;

function fillPixel(pixelData32, ind, val) {
/*    ind <<= 2;
    if (val >= MAX_ITER) {
        val = val & MAX_ITER_MASK;
        pixelData[ind] = colorMap2[val];
        pixelData[ind + 1] = colorMap2[val + MAX_ITER];
        pixelData[ind + 2] = colorMap2[val + 2 * MAX_ITER];
    } else {
        pixelData[ind] = colorMap[val];
        pixelData[ind + 1] = colorMap[val + MAX_ITER];
        pixelData[ind + 2] = colorMap[val + 2 * MAX_ITER];
    }
    pixelData[ind + 3] = 255;*/
    if (val >= MAX_ITER) {
        val = val & MAX_ITER_MASK;
        pixelData32[ind] = colorMapC2[val];
    } else {
        pixelData32[ind] = colorMapC[val];
    }
}

var cscaleStep = 2;

function distToPix(dist, cscale) {
    return Number(dist / ((cscale & 1) ? 1448n : 2048n));
}

function pixToDist(pix, cscale) {
    return BigInt(pix) * ((cscale & 1) ? 1448n : 2048n);
}

var xmin = 0n;
var ymin = 0n;
        
var valCache = {
	'history': []
};
const CACHE_POW = 8;
const CACHE_SIZE = 1 << CACHE_POW;
const CACHE_MASK = CACHE_SIZE - 1;

valCache.checkBound = function() {
    let xminabs = valCache[cscaleStep].xmin > xmin ? valCache[cscaleStep].xmin - xmin : xmin - valCache[cscaleStep].xmin;
    let yminabs = valCache[cscaleStep].ymin > ymin ? valCache[cscaleStep].ymin - ymin : ymin - valCache[cscaleStep].ymin;
    return xminabs + yminabs < pixToDist(1000000);
}

valCache.createCache = function() {
    if (valCache[cscaleStep]) {
        if (valCache.checkBound()) {
            return;
        }
    }
    valCache[cscaleStep] = {
        'xmin': xmin,
        'ymin': ymin,
        'data': new Map()
    };
}
valCache.createCache();

valCache.cleanup = function() {
	const MAX_LEN = 268435456 / CACHE_SIZE / CACHE_SIZE;
	if (valCache.history.length > MAX_LEN) {
		const newHistory = [];
		let deli = 0;
		for (const [s, i] of valCache.history) {
			if (valCache[s].data.get(i) && !valCache[s].data.get(i).tile && valCache.history.length - deli > MAX_LEN / 2) {
				valCache[s].data.delete(i);
				++deli;
			} else {
				newHistory.push([s,i]);
			}
		}
		valCache.history = newHistory;
	}
}

const NWORKERS = Math.min(4, navigator.hardwareConcurrency - 1);
var workerArr = [];

var workQueue = [];

var workerFree = new Array(NWORKERS);
workerFree.fill(1);

function U16FromU32(buf) {
    let data32 = new Uint32Array(buf);
    let data16 = new Uint16Array(data32.length);
    for (let i = 0; i < data32.length; ++i) {
        data16[i] = data32[i];
    }
    return data16;
}

function dispatchWorker(w) {
    while (workQueue.length) {
		const task = workQueue.pop();
		let curc = valCache[task.cscaleStep];
		let pend = curc.data.get(task.icxi + (task.icyi << 16));
		if (pend && pend.status == 'queued' && (curc.xmin == task.cxmin) && (curc.ymin == task.cymin)) {
			pend.status = 'pending';
			w.postMessage(task);
			return;
		}
	}
}

for (let i = 0; i < NWORKERS; ++i) {
    let w = new Worker('worker.js');
    w.addEventListener("message", function (msg) {
		let [s, i] = [msg.data.cscaleStep, msg.data.icxi + (msg.data.icyi << 16)];
		let res = valCache[s].data.get(i);
		valCache.history.push([s, i]);
        res.data = U16FromU32(msg.data.data);
		res.status = 'finished';
		dispatchWorker(w);
    });
    workerArr.push(w);
};

var sxmin;
var symin;

function forTilesInRange(rect, xmin, ymin, scale, fn) {
	const cache = valCache[scale];
	if (!cache) return;
    const icx = distToPix(xmin - cache.xmin, scale);
    const icy = distToPix(ymin - cache.ymin, scale);
	
	const ixmin = (icx + rect[0][0] - CACHE_MASK) >> CACHE_POW;
	const ixmax = (icx + rect[0][1]) >> CACHE_POW;
	const iymin = (icy + rect[1][0] - CACHE_MASK) >> CACHE_POW;
	const iymax = (icy + rect[1][1]) >> CACHE_POW;
	
	for (let x = ixmin; x <= ixmax; ++x) {
		for (let y = iymin; y <= iymax; ++y) {
			fn(x, y);
		}
	}
}

function DPR() {
	return (window.devicePixelRatio || 1) * window.visualViewport.scale;
}

function wHeight() {
	return window.visualViewport.height;
}

function wWidth() {
	return window.visualViewport.width;
}

function scaledWindow() {
	return [wWidth()*DPR(), wHeight()*DPR()];
}

function __dispatchForDraw(mx, my) {
	valCache.createCache();
    const curc = valCache[cscaleStep];
	
    function overfl(d) {
        return d >> 2;
    }
    
    let redrawArr = [];
	
	const [width, height] = scaledWindow();

    forTilesInRange([[-overfl(width), width + overfl(width)],[-overfl(height), height + overfl(height)]], xmin, ymin, cscaleStep, (icxi, icyi)=>{
		const bi = icxi + (icyi << 16);
		if (!curc.data.get(bi)) {
			curc.data.set(bi, {'status': 'queued'});
		} else if (curc.data.get(bi).status != 'queued') {
			return;
		}
		redrawArr.push([icxi, icyi]);
	});

	const cx = Math.floor(mx);
	const cy = Math.floor(my);
    const icx = distToPix(xmin - curc.xmin, cscaleStep);
    const icy = distToPix(ymin - curc.ymin, cscaleStep);
    const cxi = (icx + cx) >> CACHE_POW;
    const cyi = (icy + cy) >> CACHE_POW;
    
    redrawArr.sort((p1, p2)=>{
        const [x1, y1] = p1;
        const [x2, y2] = p2;
        
        const d1 = (x1 - cxi)*(x1 - cxi) + (y1 - cyi)*(y1 - cyi);
        const d2 = (x2 - cxi)*(x2 - cxi) + (y2 - cyi)*(y2 - cyi);
        
        return d1 > d2 ? -1 : d1 == d2 ? 0 : 1;
    });
    
    for (const [icxi, icyi] of redrawArr) {
		workQueue.push({
			'icxi': icxi,
			'icyi': icyi,
			'cxmin': curc.xmin,
			'cymin': curc.ymin,
			'cscaleStep': cscaleStep,
			'maxIter': MAX_ITER * (((cscaleStep / 8) + 1.5) | 0),
			'cache_pow': CACHE_POW
		});
    }

    for (let i = 0; i < NWORKERS; ++i) {
        if (workerFree[i]) {
			dispatchWorker(workerArr[i]);
        }
    }
    
    workQueue = workQueue.slice(-2048);
}

async function dispatchForDraw(mx, my) {
	if (dispatchForDraw.free) {
		dispatchForDraw.free = false;
		while(true) {
			__dispatchForDraw(mx, my)
			await new Promise((a)=>{setTimeout(_=>a(), 250)});
			if (dispatchForDraw.args) {
				[mx, my] = dispatchForDraw.args;
				dispatchForDraw.args = null;
			} else {
				dispatchForDraw.free = true;
				return;
			}
		}
	} else {
		dispatchForDraw.args = [mx, my];
	}
}
dispatchForDraw.free = true;

var drawnTiles = [];

function dscaleToStretch(dscale) {
	dm = dscale % 2 == 0 ? 0 : 1;
	let sfact = Math.pow(2, (dm - dscale) / 2);
	if (dm > 0) {
		if (cscaleStep & 1) {
			sfact *= 181 / 256;
		} else {
			sfact *= 128 / 181;
		}
	}
	return sfact;
}

function defaultTransform() {
	return new DOMMatrix().
		scale(1 / DPR());
}

var animation = {
	'raw_transform': new DOMMatrix(),
	'SPEED': 1,
	'lastT': null
};

animation.transform = function() {
	return defaultTransform().multiply(animation.raw_transform)
}

function transformRect(rect, transform) {
	res = [[null, null],[null, null]];
	for (let i of [0, 1]) {
		const pt = (new DOMPoint(rect[0][i], rect[1][i])).matrixTransform(transform);
		res[0][i] = pt.x;
		res[1][i] = pt.y;
	}
	return res;
}

function toScaleFixed(matrix) {
	function fixedPoint(matrix) {
		const { a, b, c, d, e, f } = matrix;
		const det = (a - 1) * (d - 1) - b * c;
		if (det == 0) return [0, 0];
		return [((c * f) - ((d - 1) * e)) / det, (((b * e) - ((a - 1) * f))) / det];
	}

	return [matrix.a, fixedPoint(matrix)];
}

function fromScaleFixed(scale, pt) {
	return new DOMMatrix()
		.translate(pt[0], pt[1])
		.scale(scale)
		.translate(-pt[0], -pt[1]);
}

function movePoint(x, y, dscale) {
	let res = [x, y];
	if (dscale < 0) {
		for (let i of [0,1]) {
			res[i] >>= BigInt((-dscale + 1 - (cscaleStep & 1)) >> 1);
		}
	} else {
		for (let i of [0,1]) {
			res[i] <<= BigInt((dscale + (cscaleStep & 1)) >> 1);
		}
	}
	return res;
}

function drawForScale(dscale, z) {
	const newScale = cscaleStep + dscale;
	if (newScale < 0) return;
	const curc = valCache[newScale];
	if (!curc) return;
	let [sxmin, symin] = movePoint(xmin, ymin, dscale);
    let icx = distToPix(sxmin - curc.xmin, newScale);
    let icy = distToPix(symin - curc.ymin, newScale);
	const transform = animation.transform().scale(dscaleToStretch(dscale));
	forTilesInRange(transformRect([[0, wWidth()],[0, wHeight()]], transform.inverse()), sxmin, symin, newScale, (ix, iy)=>{
		const bi = ix + (iy << 16);
		let cached = curc.data.get(bi);
		if (!cached) return;
		if (cached.status != 'finished') return;
		let tile = cached.tile;
		let draw = false;
		if (!tile) {
			tile = document.createElement('canvas');
			cached.tile = tile;
			tile.style.position = 'absolute';
			tile.style['image-rendering'] = "pixelated";
			tile.width = CACHE_SIZE;
			tile.height = CACHE_SIZE;
			document.getElementById('main').appendChild(tile);
			const ctx = tile.getContext('2d');
			const imgData = ctx.createImageData(CACHE_SIZE, CACHE_SIZE);
			const pixelData = new Uint32Array(imgData.data.buffer);
			for (let i = 0; i < pixelData.length; ++i) {
				fillPixel(pixelData, i, cached.data[i]);
			}
			ctx.putImageData(imgData, 0, 0);
			drawnTiles.push([newScale, bi]);
		}
		tile.style['z-index'] = z;
		let ixp = (ix << CACHE_POW) - icx;
		let iyp = (iy << CACHE_POW) - icy;
		
		function computeRoundInterval(intvl) {
			const precision = 0.01;
			return [
				Math.floor(intvl[0] / precision) * precision,
				(Math.floor(intvl[1] / precision) + 1) * precision
			];
		}
		const rawRect = [[ixp, ixp + CACHE_SIZE], [iyp, iyp + CACHE_SIZE]];
		let rect = transformRect(rawRect, transform);
		for (let i of [0,1]) {
			rect[i] = computeRoundInterval([rect[i][0], rect[i][1]]);
		}
		tile.style.width = `${rect[0][1] - rect[0][0]}px`;
		tile.style.height = `${rect[1][1] - rect[1][0]}px`;
		tile.style.left = `${rect[0][0]}px`;
		tile.style.top = `${rect[1][0]}px`;
		//tile.style.visibility = dscale == 0 ? 'hidden' : 'visible';
		tile.__drawn = true;
	});
}

var easingEnabled = true;

function animEasingStep() {
	curAnimT = Date.now();
	if (animation.lastT && curAnimT > animation.lastT && easingEnabled) {
		let [scale, fixed] = toScaleFixed(animation.raw_transform);
		let dlog = animation.SPEED * (curAnimT - animation.lastT) / 1000;
		if (dlog > Math.abs(Math.log(scale))) {
			scale = 1;
		} else {
			dlog += (Math.abs(Math.log(scale)) - dlog) * animation.SPEED / 10;
			scale *= Math.exp(dlog * (scale > 1 ? -1 : 1));
		}
		animation.raw_transform = fromScaleFixed(scale, fixed);
	}
	animation.lastT = curAnimT;
}

var DRAWING_ENABLED = true
async function drawLoop() {
	while (true) {
		await new Promise((a)=>{requestAnimationFrame((t)=>a())});
		if (!DRAWING_ENABLED) continue
		const drawnByScale = new Map();
		for (let [s, i] of drawnTiles) {
			valCache[s].data.get(i).tile.__drawn = false;
			drawnByScale.set(s, drawnByScale.get(s) + 1 || 1);
		}
		
		const layers = Array.from(drawnByScale.keys()).filter((s)=>{return s < cscaleStep}).sort((s1, s2)=>{
			const c1 = drawnByScale.get(s1) - drawnByScale.get(s2);
			return c1 != 0 ? c1 : s1 - s2;
		}).slice(-3);
		
		for (let i = 0; i < layers.length; ++i) {
			drawForScale(layers[i] - cscaleStep, i);
		}
		drawForScale(0, layers.length);

		let redrawnTiles = [];
		valCache.cleanup();
		for (let [s, i] of drawnTiles) {
			const cache = valCache[s].data.get(i);
			if (cache) {
				if (!cache.tile.__drawn) {
					cache.tile = cache.tile.remove();
				} else {
					redrawnTiles.push([s, i]);
				}
			}
		}
		drawnTiles = redrawnTiles;
		
		animEasingStep();
	}
}

function dprScale(evt) {
	const pt = new DOMPoint(evt.clientX, evt.clientY)
		.matrixTransform(animation.transform().inverse());
	return [Math.round(pt.x), Math.round(pt.y)];
}

function dragBy(dx, dy) {
	if (dx == 0 && dy == 0) return;
	xmin -= pixToDist(dx, cscaleStep);
	ymin -= pixToDist(dy, cscaleStep);
}

function visualScale(stretch, fx, fy) {
	animation.raw_transform.multiplySelf(new DOMMatrix()
		.translate(fx, fy)
		.scale(stretch)
		.translate(-fx, -fy)
	);
}

function scaleBy(dscale, fx, fy) {
	let [ax, ay] = movePoint(pixToDist(fx, cscaleStep) + xmin, pixToDist(fy, cscaleStep) + ymin, dscale);
	let stretch = 1;
	stretch = dscaleToStretch(dscale);
	cscaleStep += dscale;
	visualScale(stretch, fx, fy);
    xmin = ax - pixToDist(fx, cscaleStep);
    ymin = ay - pixToDist(fy, cscaleStep);
}

async function onMove(evt) {
	if (evt === 'cancel') {
		onMove.pstate = null;
	} else {
		const [ex, ey] = dprScale(evt);
		if (onMove.pstate != null) {
			let [px, py] = onMove.pstate;
			dragBy(ex - px, ey - py);
			dispatchForDraw(ex, ey);
		}
		onMove.pstate = [ex, ey];
	}
}

async function onPinch(evts) {
	function mid(p1, p2) {
		let res = [];
		for (let i of [0,1]) {
			res.push((p1[i] + p2[i]) >> 1);
		}
		return res;
	}
	
	if (evts == 'cancel') {
		if (onPinch.initState != null) {
			onPinch.initState = null;
			let [scale, fixed] = toScaleFixed(animation.raw_transform)
			let dscale = Math.round(Math.log(scale) / Math.log(1.4142));
			if (dscale + cscaleStep < 0) dscale = -cscaleStep;
			if (dscale != 0) {
				const [x1, y1, x2, y2] = onPinch.pState;
				const [mx, my] = mid([x1, y1], [x2, y2]); 
				scaleBy(dscale, mx, my);
			}
			const [ex, ey] = dprScale({
				'clientX': wWidth() >> 1,
				'clientY': wHeight() >> 1,
			})
			dispatchForDraw(ex, ey);
			easingEnabled = true;
		}
	} else {
		easingEnabled = false;
		const [x1, y1, x2, y2] = [...dprScale(evts[0]), ...dprScale(evts[1])];
		if (onPinch.initState != null) {
			const [ix1, iy1, ix2, iy2] = onPinch.initState;
			const [px1, py1, px2, py2] = onPinch.pState;
			function dist(p1, p2) {
				return Math.hypot(p1[0] - p2[0], p1[1] - p2[1]);
			}
			
			const [mx, my] = mid([x1, y1], [x2, y2]);
			const d = dist([x1, y1], [x2, y2]);
			const [pmx, pmy] = mid([px1, py1], [px2, py2]);
			const id = dist([ix1, iy1], [ix2, iy2]);
			dragBy(mx - pmx, my - pmy);
			dispatchForDraw(mx, my);
			visualScale(d / id, mx, my);
		} else {
			onPinch.initTransform = animation.transform();
			onPinch.initState = [x1, y1, x2, y2];
		}
		onPinch.pState = [x1, y1, x2, y2];
	}
}

async function onScroll(evt) {
	const [ex, ey] = dprScale(evt);
	let dscale = 0;
    if (evt.wheelDelta < 0) {
        if (cscaleStep > 0) {
			dscale = -1;
        }
    } else {
		dscale = 1;
    }
	scaleBy(dscale, ex, ey);
	dispatchForDraw(ex, ey);
}

function snapshot(w, h) {
	DRAWING_ENABLED = false
    console.log(`[snapshot] Starting ${w}x${h} capture...`);
    const t0 = performance.now();

    valCache.createCache();
    const curc = valCache[cscaleStep];
    const scale = cscaleStep;
    const [viewW, viewH] = scaledWindow();
    const icx = distToPix(xmin - curc.xmin, scale);
    const icy = distToPix(ymin - curc.ymin, scale);
    const maxIter = MAX_ITER * (((scale / 8) + 1.5) | 0);

    // 1:1 pixel mapping, centered on viewport center
    const x0 = icx + (viewW >> 1) - (w >> 1);
    const y0 = icy + (viewH >> 1) - (h >> 1);

    const ixmin = x0 >> CACHE_POW;
    const ixmax = (x0 + w - 1) >> CACHE_POW;
    const iymin = y0 >> CACHE_POW;
    const iymax = (y0 + h - 1) >> CACHE_POW;

    const needed = [];
    let queued = 0;
    for (let ix = ixmin; ix <= ixmax; ix++) {
        for (let iy = iymin; iy <= iymax; iy++) {
            const bi = ix + (iy << 16);
            if (!curc.data.get(bi)) {
                curc.data.set(bi, {'status': 'queued'});
                workQueue.push({
                    'icxi': ix, 'icyi': iy,
                    'cxmin': curc.xmin, 'cymin': curc.ymin,
                    'cscaleStep': scale, 'maxIter': maxIter,
                    'cache_pow': CACHE_POW
                });
                queued++;
            }
            needed.push(bi);
        }
    }
    console.log(`[snapshot] ${needed.length} tiles needed, ${queued} newly queued (${needed.length - queued} cached)`);

    for (let i = 0; i < NWORKERS; ++i) {
        dispatchWorker(workerArr[i]);
    }

    return new Promise(resolve => {
        let lastLog = 0;
        (function check() {
            const done = needed.filter(bi => { const c = curc.data.get(bi); return c && c.status === 'finished'; }).length;
            if (done < needed.length) {
                const now = performance.now();
                if (now - lastLog > 500) {
                    console.log(`[snapshot] Computing tiles: ${done}/${needed.length} (${(done / needed.length * 100).toFixed(1)}%)`);
                    lastLog = now;
                }
                setTimeout(check, 100);
                return;
            }
            console.log(`[snapshot] All ${needed.length} tiles ready in ${((performance.now() - t0) / 1000).toFixed(2)}s. Assembling image...`);

            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            const imgData = ctx.createImageData(w, h);
            const pd = new Uint32Array(imgData.data.buffer);

            for (let py = 0; py < h; py++) {
                const ty = y0 + py;
                const iy = ty >> CACHE_POW;
                const dy = ty - (iy << CACHE_POW);
                for (let px = 0; px < w; px++) {
                    const tx = x0 + px;
                    const ix = tx >> CACHE_POW;
                    const dx = tx - (ix << CACHE_POW);
                    const cached = curc.data.get(ix + (iy << 16));
                    if (cached && cached.data) {
                        fillPixel(pd, py * w + px, cached.data[(dy << CACHE_POW) + dx]);
                    }
                }
            }

            ctx.putImageData(imgData, 0, 0);
            console.log(`[snapshot] Image assembled. Encoding PNG...`);
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'mandelbrot.png';
                a.click();
                URL.revokeObjectURL(url);
                console.log(`[snapshot] Done. ${w}x${h} PNG saved in ${((performance.now() - t0) / 1000).toFixed(2)}s`);
				DRAWING_ENABLED = true
                resolve();
            }, 'image/png');
        })();
    });
}

document.addEventListener("DOMContentLoaded", ()=>{
    function onResize() {
		animation.raw_transform = new DOMMatrix();
		const [w, h] = scaledWindow();
		dispatchForDraw(w, h, w>>1, h>>1);
    }

	const [w, h] = scaledWindow();
	xmin = - pixToDist(w >> 1) - (1n << BigInt((cscaleStep >> 1) + 18));
	ymin = - pixToDist(h >> 1);
	onResize();
	drawLoop();
    
	const evtTarget = document.body;
	evtTarget.id = 'control';
	evtTarget.style['touch-action'] = 'none';
	evtTarget.style.backgroundColor = fillCol;
	
    evtTarget.addEventListener('wheel', onScroll);
//    evtTarget.addEventListener('mousemove', onMove);

	const pointers = new Map();
	evtTarget.addEventListener("pointerdown", e => {
	  pointers.set(e.pointerId, e);
	  evtTarget.setPointerCapture(e.pointerId);
	});

	evtTarget.addEventListener("pointermove", e => {
	  if (!pointers.has(e.pointerId)) return;
	  pointers.set(e.pointerId, e);

	  if (pointers.size === 1) {
		onMove(e);
		//onPinch([{'clientX': 0, 'clientY': 0}, ...pointers.values()]);
	  } else if (pointers.size === 2) {
		onPinch([...pointers.values()]);
	  }
	});

	evtTarget.addEventListener("pointerup", cleanup);
	evtTarget.addEventListener("pointercancel", cleanup);

	function cleanup(e) {
	  onMove('cancel');
	  onPinch('cancel');
	  pointers.delete(e.pointerId);
	}
        
    window.addEventListener("resize", onResize);	
});
